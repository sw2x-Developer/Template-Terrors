<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HootCorp — Internal Greeter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d1117;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 40px 44px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        .card-icon { font-size: 2rem; margin-bottom: 14px; }

        h1 {
            font-size: 1.3rem;
            color: #e6edf3;
            margin-bottom: 6px;
        }

        .sub {
            color: #6e7681;
            font-size: 0.82rem;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        label {
            display: block;
            font-size: 0.78rem;
            color: #8b949e;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px 14px;
            color: #e6edf3;
            font-size: 0.95rem;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }

        input[type="text"]:focus { border-color: #58a6ff; }

        .btn {
            width: 100%;
            background: #238636;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 11px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover { background: #2ea043; }

        .result-card {
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 6px;
            padding: 16px 20px;
            margin-top: 24px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #c9d1d9;
            word-break: break-all;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-icon">&#128075;</div>
    <h1>HootCorp Internal Greeter</h1>
    <p class="sub">Enter your name to generate a personalised greeting.</p>

    <form method="POST" action="/" autocomplete="off">
        <label for="name">Your name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Alice"
               value="{{ name | e }}" autofocus>
        <button type="submit" class="btn">Generate Greeting</button>
    </form>

    {% if result is not none %}
    <div class="result-card">{{ result | safe }}</div>
    {% endif %}
</div>

</body>
</html>
